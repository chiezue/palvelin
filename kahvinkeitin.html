<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <title>Kahvinkeitin UI</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        color: #222;
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 400px;
        margin: 40px auto;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 8px #0002;
        padding: 2em;
      }
      h1 {
        text-align: center;
      }
      button {
        margin: 0.5em 0.25em;
        padding: 0.5em 1.5em;
        font-size: 1em;
        border-radius: 4px;
        border: 1px solid #888;
        background: #eee;
        cursor: pointer;
      }
      button:active {
        background: #ddd;
      }
      #status {
        font-weight: bold;
        margin: 1em 0;
        text-align: center;
      }
      #result {
        margin: 1em 0;
        text-align: center;
        font-size: 1.2em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Kahvinkeitin</h1>
      <div id="status">Keittimen tila: ...</div>
      <div style="text-align: center">
        <button onclick="setOn()">Päälle</button>
        <button onclick="setOff()">Pois päältä</button>
        <button onclick="toggle()">Vaihda tila</button>
        <button onclick="makeCoffee()">Kahvia!</button>
      </div>
      <div id="result"></div>
    </div>
    <script>
      const api = "http://localhost:3002";
      function updateStatus() {
        fetch(api + "/status")
          .then((r) => r.json())
          .then((data) => {
            document.getElementById("status").textContent =
              "Keittimen tila: " + (data.isOn ? "PÄÄLLÄ" : "POIS PÄÄLTÄ");
          });
      }
      function setOn() {
        fetch(api + "/set/on").then(updateStatus);
        document.getElementById("result").textContent = "";
      }
      function setOff() {
        fetch(api + "/set/off").then(updateStatus);
        document.getElementById("result").textContent = "";
      }
      function toggle() {
        fetch(api + "/switch").then(updateStatus);
        document.getElementById("result").textContent = "";
      }
      function makeCoffee() {
        document.getElementById("result").textContent = "Kahvia keitetään...";
        fetch(api + "/coffee")
          .then((r) => r.json())
          .then((data) => {
            if (data.status === "success") {
              document.getElementById("result").textContent = data.message;
            } else {
              document.getElementById("result").textContent = data.message;
            }
            updateStatus();
          })
          .catch(() => {
            document.getElementById("result").textContent =
              "Virhe yhteydessä palvelimeen.";
          });
      }
      updateStatus();
    </script>
  </body>
</html>
